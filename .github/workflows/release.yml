name: Release UserScript

on:
  push:
    branches:
      - master
    tags:
      - 'v*'

concurrency:
  group: userscript-release
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build the UserScript
        run: npm run build

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/rewards-points-farmer.user.js
          generate_release_notes: true
          make_latest: true

      - name: Replace asset in latest Release
        if: github.ref == 'refs/heads/master'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          latest_tag="$(gh release view --repo "$GITHUB_REPOSITORY" --json tagName --jq '.tagName')"
          if [ -z "$latest_tag" ]; then
            echo "No latest Release is available for asset upload."
            exit 1
          fi
          gh release upload "$latest_tag" dist/rewards-points-farmer.user.js \
            --repo "$GITHUB_REPOSITORY" \
            --clobber
          echo "Updated rewards-points-farmer.user.js in Release $latest_tag" >> "$GITHUB_STEP_SUMMARY"
